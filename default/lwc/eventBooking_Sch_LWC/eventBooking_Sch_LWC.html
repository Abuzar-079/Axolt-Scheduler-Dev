<template>
<div class=" bg-white">
<template if:true={isLoading}>
    <lightning-spinner variant="brand" size="large" alternative-text="Loading...(Waiting for response)"></lightning-spinner>
</template>


<template if:true={errorMessage}>
    <div class="slds-notify_container slds-is-fixed">
        <div class="slds-notify slds-notify_toast slds-theme_error" role="status">
            <span class="slds-assistive-text">error</span>
            <!-- commented by adnan cuz slds-icon-Utility-error is not in slds 2 -->
            <!-- <span class="slds-icon_container slds-icon-utility-error slds-m-right_small slds-no-flex slds-align-top"> -->
                <span class="slds-icon_container slds-icon-text-error slds-m-right_small slds-no-flex slds-align-top">
                <lightning-icon icon-name="utility:error" variant="inverse" alternative-text="Error!" title="Error"></lightning-icon>
            </span>
            <div class="slds-notify__content">
                <h2 class="slds-text-heading_x-small">{errorMessage}</h2>
            </div>
            <div class="slds-notify__close">    
                <button class="slds-button" onclick={closeError}>
                    <lightning-icon icon-name="utility:close" variant="inverse" alternative-text="close!" title="Close"></lightning-icon>
                </button>
            </div>
        </div>
    </div>
</template>

<template if:true={successMessage}>
    <div class="slds-notify_container slds-is-fixed">
        <div class="slds-notify slds-notify_toast slds-theme_success" role="status">
            <span class="slds-assistive-text">success</span>
            <span class="slds-icon_container slds-icon-utility-success slds-m-right_small slds-no-flex slds-align-top">
                <lightning-icon icon-name="utility:success" variant="inverse" alternative-text="Success!" title="Success"></lightning-icon>
            </span>
            <div class="slds-notify__content">
                <h2 class="slds-text-heading_x-small">{successMessage}</h2>
            </div>
            <div class="slds-notify__close">
                <button class="slds-button" onclick={closeError}>
                    <lightning-icon icon-name="utility:close" variant="inverse" alternative-text="close!" title="Close"></lightning-icon>
                </button>
            </div>
        </div>
    </div>
</template>

<template if:false={eventId}>
    <div class="event_rok booking-kare">
    <div class="container-fluid">
        <div class="row m-0 pt-3 displaylabel">
            <div class="controls text-left col-8">
    <!-- Today's Events -->
    <button class={todayButtonClass} data-val="today" onclick={searchEvent}>
        <lightning-icon
            icon-name="utility:date_input"
            size="x-small"
            class="slds-m-right_small "
            variant={todayIconVariant}>
        </lightning-icon>
        Todays Events <span class="slds-m-left_small">{todaysEvents}</span>
    </button>

    <!-- This Week Events -->
    <button class={thisWeekButtonClass} data-val="thisWeek" onclick={searchEvent}>
        <lightning-icon
            icon-name="utility:date_input"
            size="x-small"
            class="slds-m-right_small color-white"
            variant={weekIconVariant}>
        </lightning-icon>
        This Week Events <span class="slds-m-left_small">{thisWeeksEvents}</span>
    </button>

    <!-- Next Week Events -->
    <button class={nextWeekButtonClass} data-val="nextWeek" onclick={searchEvent}>
        <lightning-icon
            icon-name="utility:forward"
            size="x-small"
            class="slds-m-right_small color-white"
            variant={nextIconVariant}>
        </lightning-icon>
        Next Week Events <span class="slds-m-left_small"> {nextWeeksEvents}</span>
    </button>

    <!-- Future Events -->
    <button class={futureButtonClass} data-val="future" onclick={searchEvent}>
        <lightning-icon
            icon-name="utility:strategy"
            size="x-small"
            class="slds-m-right_small"
            variant={futureIconVariant}>
        </lightning-icon>
        Future Events <span class="slds-m-left_small">{futureEvents}</span>
    </button>
</div>

            <div class="col-3">
                <div class="maq slds-grid slds-align-center mt-2" style="position: relative;">
    <!-- Search with Icon -->
    <div class="search-wrapper">
        <lightning-icon

            size="x-small"
            class="search-icon"
        ></lightning-icon>
        <lightning-input
            type="search"
            value={filterName}
            placeholder="Search Event..."
            onchange={handleFilterEventsByName}
            onkeyup={handleFilterEventsByName}
            class="custom-search-input"
            variant="label-hidden"
        ></lightning-input>
    </div>

    <!-- Filter Icon Button -->
    <div class="filter-button" onclick={toggleFilters}>
        <lightning-icon
            icon-name="utility:filterList"
            size="x-small"
            alternative-text="Filter"
            class="filter-icon"
        ></lightning-icon>
    </div>

    <!-- Floating Filter Popover -->
    <template if:true={showFilterOptions}>
        <div class="filter-popover">
            <lightning-combobox
                name="locationId"
                value={filterLocation}
                options={locationList}
                onchange={handleLocationChange}
            ></lightning-combobox>
            <lightning-combobox
                name="typeOfEventId"
                value={filterType}
                options={typeOfEventList}
                onchange={handleTypeChange}
            ></lightning-combobox>
        </div>
    </template>
</div>

            </div>

          <div class="view-toggle">
    <div class="toggle-container">
        <div
            class={gridClass}
            data-tab="grid"
            onclick={changeView}
            title="Grid View"
        >
            <lightning-icon
                icon-name="utility:tile_card_list"
                size="x-small"
            ></lightning-icon>
        </div>
        <div
            class={listClass}
            data-tab="list"
            onclick={changeView}
            title="List View"
        >
            <lightning-icon
                icon-name="utility:picklist_type"
                size="x-small"
            ></lightning-icon>
        </div>
    </div>
</div>



        </div>
    </div>
    </div>

    <template if:true={isGridView}>
        <div class="slds-grid slds-wrap">
    <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
        <div class="slds-grid slds-wrap">

            <!-- No Events -->
            <template if:false={eventListWP.length}>
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
                    <div class="slds-notify_container slds-is-relative slds-m-top_x-large">
                        <div class="slds-notify slds-notify_toast slds-theme_warning" role="status">
                            <!-- <span class="slds-icon_container slds-icon-utility-warning slds-m-right_small slds-no-flex slds-align-top"> commented by adnan cuz slds utility is not in slds 2-->
                                <span class="slds-icon_container slds-icon-text-warning slds-m-right_small slds-no-flex slds-align-top">
                                <lightning-icon icon-name="utility:warning" size="small" alternative-text="warning"></lightning-icon>
                            </span>
                            <div class="slds-notify__content">
                                <div class="slds-text-heading_small">Sorry, No Events Available.</div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Event Cards -->
            <template for:each={eventListWithExtras} for:item="event" for:index="eventIndex">
                <div key={event.EVT.Id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_small">

                    <!-- Full Registration Message -->
                    <template if:true={event.showFull}>
                        <div class="maq-fade slds-theme_warning slds-p-around_small slds-text-align_center">
                            <lightning-icon icon-name="utility:warning" class="slds-m-right_x-small" size="x-small"></lightning-icon>
                            <span>This Event's Registrations are full</span>
                        </div>
                    </template>

                    <!-- Card -->
                    <div class="slds-card shadow-custom slds-m-bottom_small b-radius-eb">
                        <div class="slds-card__body slds-p-horizontal_small">

                            <!-- Registration Full -->
                            <template if:false={event.EVT.Available_Registrations__c}>
                                <!-- <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_warning maq-fade" role="alert"> commented by adnan cuz tag not in slds 2 -->
                                    <div class="slds-notify slds-notify_alert slds-theme_warning maq-fade" role="alert">
                                    <lightning-icon icon-name="utility:warning" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                    <span>This Event Registrations are full</span>
                                </div>
                            </template>

                            <div class="slds-grid slds-wrap slds-gutters">

                                <!-- Default Image -->
                                <template if:false={event.EVT.Picture__c}>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                    <img class="slds-image" alt="Event image" src="https://axolt.com/wp-content/uploads/2025/07/Axolt_CPQ_16xdh516xdh516xd-1250x700.jpg" />
                                </div>
                                </template>

                                <!-- Conditional Event Image -->
                                <template if:true={event.EVT.Picture__c}>
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                        <img class="slds-image" alt="Event image2" src={event.EVT.Picture__c} />
                                    </div>
                                </template>

                                <!-- Event Info -->
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-3">
                                    <div class="scroll-bar-wrap">
                                        <div class="scroll-box">
                                            <h4 class="slds-text-heading_small slds-m-bottom_small">
                                                <a href={event.url} target="_blank">{event.EVT.Name}</a>
                                            </h4>
                                        </div>
                                    </div>

                                    <!-- Date Range -->
                                    <div class="slds-grid slds-align_absolute-left slds-m-bottom_xx-small">
                                        <lightning-icon icon-name="utility:contract_doc" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                        <div class="slds-text-body_small">
                                            <lightning-formatted-date-time value={event.EVT.Start_Date__c} time-zone={timezone}></lightning-formatted-date-time>
                                            &nbsp;–&nbsp;
                                            <lightning-formatted-date-time value={event.EVT.End_Date__c} time-zone={timezone}></lightning-formatted-date-time>
                                        </div>
                                    </div>

                                    <!-- Time Range -->
                                    <div class="slds-grid slds-align_absolute-left slds-m-bottom_xx-small">
                                        <lightning-icon icon-name="utility:clock" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                        <div class="slds-text-body_small">
                                            <lightning-formatted-date-time value={event.EVT.Start_Date__c} hour="2-digit" minute="2-digit" time-zone={timezone}></lightning-formatted-date-time>
                                            &nbsp;–&nbsp;
                                            <lightning-formatted-date-time value={event.EVT.End_Date__c} hour="2-digit" minute="2-digit" time-zone={timezone}></lightning-formatted-date-time>
                                        </div>
                                    </div>

                                    <!-- Age Range -->
                                    <template if:true={event.EVT.Age_Range__c}>
                                        <div class="slds-grid slds-align_absolute-left slds-m-bottom_xx-small">
                                            <lightning-icon icon-name="utility:user" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                            <span class="slds-text-body_small">{event.EVT.Age_Range__c}</span>
                                        </div>
                                    </template>

                                    <!-- Location -->
                                    <template if:true={event.EVT.Event_Location__c}>
                                        <div class="slds-grid slds-align_absolute-left slds-m-bottom_xx-small">
                                            <lightning-icon icon-name="utility:location" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                            <span class="slds-text-body_small">{event.EVT.Event_Location__r.Name}</span>
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <!-- Weekdays & Button -->
                            <div class="slds-grid slds-wrap slds-m-top_medium slds-align_absolute-center">
                                <div class="slds-col slds-size_2-of-3">
                                    <div class="slds-grid slds-wrap">
                                        <template for:each={event.evtWeekDays} for:item="eventWD">
                                            <div key={eventWD} class="eb45 slds-m-right_x-small slds-text-body_small">{eventWD}</div>
                                        </template>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-text-align_right">
                                    <a class="slds-button slds-button_neutral" onclick={selectEvent} data-record-id={event.EVT.Id} data-index={eventIndex}>
                                        Apply to attend
                                    </a>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

    </template>
    <template if:true={isListView}>
        <div class="card shadow-custom slds-m-around_small">
            <div class="card-body">
                <template if:false={eventListWP.length}>
                    <div class="col-lg-12 mb-5 mb-lg-0">
                        <div class="slds-notify_container slds-is-relative mt-7">
                            <div class="slds-notify slds-notify_toast slds-theme_warning" role="status">
                                <!-- <span class="slds-icon_container slds-icon-utility-warning slds-m-right_small slds-no-flex slds-align-top"> commented by adnan-->
                                    <span class="slds-icon_container slds-icon-text-warning slds-m-right_small slds-no-flex slds-align-top">
                                    <lightning-icon icon-name="utility:warning" size="small" alternative-text="warning"></lightning-icon>
                                </span>
                                <div class="slds-notify__content">
                                    <div class="slds-text-heading_small">Sorry, No Events Available.</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
                <div class="table-responsive" tabindex="0">
                  <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-table_striped">
                            <thead>
                                <tr>
                                    <th scope="col" width="16.66666666666667%">Name</th>
                                    <th scope="col" width="16.66666666666667%">Timeline</th>
                                    <th scope="col" width="16.66666666666667%">Location</th>
                                    <th scope="col" width="16.66666666666667%">Type</th>
                                    <th scope="col" width="16.66666666666667%">Organiser</th>
                                    <th scope="col" width="16.66666666666667%">Available Registrations</th>
                                    <th scope="col" width="16.66666666666667%"></th>
                                </tr>
                            </thead>
                    <template for:each={eventListWithIndex} for:item="event" for:index="eventIndex">

                            <tbody  key={event.EVT.Id} >
                                <tr>
                                    <td>
                                        {event.displayIndex}. <a href={event.url} target="_blank">{event.EVT.Name}</a>
                                    </td>
                                    <td>
                                        <div class="startime-maq">
                                            <strong>
                                                <lightning-formatted-date-time
                                                    value={event.EVT.Start_Date__c}
                                                    month="short"
                                                    day="2-digit"
                                                    hour="2-digit"
                                                    minute="2-digit"
                                                    time-zone={timezone}
                                                ></lightning-formatted-date-time>
                                            </strong>
                                        </div>
                                        <div class="endime-maq">
                                            <strong>
                                                <lightning-formatted-date-time
                                                    value={event.EVT.End_Date__c}
                                                    month="short"
                                                    day="2-digit"
                                                    hour="2-digit"
                                                    minute="2-digit"
                                                    time-zone={timezone}
                                                ></lightning-formatted-date-time>
                                            </strong>
                                        </div>
                                    </td>
                                    <td>{event.EVT.Event_Location__r.Name}</td>
                                    <td>{event.EVT.Event_Type__c}</td>
                                    <td>{event.EVT.User__r.Name}</td>
                                    <td>{event.EVT.Available_Registrations__c}</td>
                                    <td>
                                        <a
                                            onclick={selectEvent}
                                            data-record-id={event.EVT.Id}
                                            data-index={eventIndex}
                                            class="slds-pill custom-pill"
                                        >
                                            <span class="slds-pill__label">Apply to Attend</span>
                                            <lightning-icon
                                                icon-name="utility:chevronright"
                                                size="xxx-small"
                                                class="slds-pill__icon_container" variant="inverse"
                                            ></lightning-icon>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>

                        </template>
                 </table>

                    </div>
            </div>
        </div>
    </template>
</template>

<template if:true={showDateColumns}>

    <div class="slds-grid slds-wrap slds-p-around_none">
        <div class="slds-col slds-size_12-of-12">
        <div class="slds-page-header slds-page-header_record-home" style="background:#ffffff;">
                    <div class="slds-page-header__row">
                        <div class="slds-page-header__title slds-truncate">
                        <div class="slds-media">
                            <div class="slds-media__figure">
                            <lightning-icon
                                icon-name="action:new_event"
                                size="small"
                                alternative-text="Scheduled Days">
                            </lightning-icon>
                            </div>
                            <div class="slds-media__body">
                            <div class="slds-page-header__title slds-truncate slds-m-top_x-small" title="Scheduled Days">
                                Scheduled Days
                            </div>
                            </div>
                        </div>
                        </div>
                    </div>
                    </div>
        </div>
        <div class="slds-col slds-size_1-of-1">
            <div class="slds-grid slds-wrap">
                <!-- Left section: Event Image and Details -->
                <div class="slds-col slds-size_1-of-3 slds-p-around_small">
                    <div class="slds-box slds-box1" style="">
                    <template if:true={event.Picture__c}>
                        <img src={event.Picture__c} alt="Event Image" class="slds-image" />
                    </template>

                    <h3 class="slds-text-heading_small slds-m-top_small">{event.Name}</h3>

                    <template if:true={hasMultipleLocOptions}>
                        <div class="slds-m-top_medium">
                            <lightning-combobox
                                label="Event Location"
                                variant="label-hidden"
                                value={selectedDcLOC}
                                options={locOptions}
                                onchange={changeDcLOC}
                            ></lightning-combobox>
                        </div>
                    </template>

                    <template if:true={event.Description__c}>
                        <div class="slds-m-top_medium slds-scrollable_y" style="max-height: 80vh;">
                            {event.Description__c}
                        </div>
                    </template>
                    </div>
                </div>
                <!-- Right section: Schedule Cards -->
                <div class="slds-col slds-size_2-of-3">


                    <div class="slds-m-bottom_medium">
                        <div class="slds-scrollable_y" style="max-height: 600px;">
                            <div class="slds-grid slds-wrap">

                                <template for:each={newDateColumnListWithClasses} for:item="slot" for:index="count">
                                    <template if:true={slot.Zone}>
                                        <div key={slot.Zone.Id} class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                            <div
                                                class={slot.cardClass}
                                                onclick={selectSchedule}
                                                data-type="singleSelect"
                                                data-location={slot.Zone.Event_Zone_Location__c}
                                                data-accesskey={slot.storeDT}
                                                data-name={slot.AvailableDate1}
                                                data-et={slot.AvailableDate2}
                                                data-record-id={slot.Zone.Id}
                                                data-index={count}
                                            >
                                                <div class="slds-box slds-theme_default b-radius-eb-timeslots">
                                                    <div class="slds-grid slds-wrap">
                                                        <div class="slds-col slds-size_11-of-12">
                                                            <div class="slds-truncate">
                                                                <lightning-icon icon-name="utility:location" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                                                <strong>
                                                                    <template if:true={slot.Zone.Event_Zone_Location__c}>
                                                                        {slot.Zone.Event_Zone_Location__r.Name}
                                                                    </template>
                                                                    <template if:false={slot.Zone.Event_Zone_Location__c}>
                                                                        {slot.Zone.Name}
                                                                    </template>
                                                                </strong>
                                                            </div>

                                                            <div class="slds-m-top_xx-small">
                                                                <lightning-formatted-date-time
                                                                    value={slot.AvailableDate1}
                                                                    weekday="long"
                                                                    month="short"
                                                                    day="2-digit"
                                                                    year="numeric"
                                                                    time-zone={timezone}
                                                                ></lightning-formatted-date-time>
                                                                <br />
                                                                <lightning-formatted-date-time
                                                                    value={slot.AvailableDate1}
                                                                    hour="2-digit"
                                                                    minute="2-digit"
                                                                    time-zone={timezone}
                                                                ></lightning-formatted-date-time>
                                                                -
                                                                <lightning-formatted-date-time
                                                                    value={slot.AvailableDate2}
                                                                    hour="2-digit"
                                                                    minute="2-digit"
                                                                    time-zone={timezone}
                                                                ></lightning-formatted-date-time>
                                                            </div>

                                                            <template if:true={slot.showQuantities}>
                                                                <div class="slds-grid slds-m-top_small">
                                                                    <div class="slds-col slds-size_1-of-2">
                                                                        <lightning-icon icon-name="utility:user" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                                                        Booked <strong>{slot.BookedQuantity}</strong>
                                                                    </div>
                                                                    <div class="slds-col slds-size_1-of-2">
                                                                        <lightning-icon icon-name="utility:user" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                                                        Available <strong>{slot.AvailableQuantity}</strong>
                                                                    </div>
                                                                </div>
                                                            </template>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-12 slds-text-align_right">
                                                            <lightning-icon icon-name="utility:chevronright" size="x-small"></lightning-icon>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </template>

                                    <template if:false={slot.Zone}>
                                        <div key={slot.Event.Id} class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                            <div
                                                class={slot.cardClass}
                                                onclick={selectSchedule}
                                                data-type="singleSelect"
                                                data-location={slot.Event.Event_Location__c}
                                                data-accesskey={slot.storeDT}
                                                data-name={slot.AvailableDate1}
                                                data-et={slot.AvailableDate2}
                                                data-record-id={slot.Event.Id}
                                                data-index={count}
                                            >
                                                <div class="slds-box slds-theme_default b-radius-eb-timeslots">
                                                    <div class="slds-grid slds-wrap">
                                                        <div class="slds-col slds-size_11-of-12">
                                                            <div class="slds-truncate">
                                                                <lightning-icon icon-name="utility:location" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                                                <strong>
                                                                    <template if:true={slot.Event.Event_Location__c}>
                                                                        {slot.Event.Event_Location__r.Name}
                                                                    </template>
                                                                    <template if:false={slot.Event.Event_Location__c}>
