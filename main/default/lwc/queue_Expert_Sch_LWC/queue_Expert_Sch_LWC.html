                                                <div class="slds-form-element">
                                                    <div class="slds-form-element__control slds-input-has-icon slds-input-has-icon_right">

                                                    <div class="slds-form-element__control slds-input-has-icon slds-input-has-icon_right">
                                                        <c-search-comp-sch

                                                        </c-search-comp-sch>
                                                    </div>

                                            </div>

                                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                                                <lightning-combobox
                                                    name="category"
                                                    options={category}
                                                    value={selcatValue}

                        </section>
                    </template>
                </div>

                <div class="event-rok erp_mark7 erp_Mark7">
                    <div class="container--fluid">
                        <div class="slds-grid slds-wrap features-boxed">

                                <div class="slds-col slds-size_1-of-3">
                                   <div class="slds-card slds-m-around_small car1">
        <div class="card-body">
            <div class="d-flex justify-content-between">
                <h6 class="card-title slds-grid">
                    {selectedUserName} ({queueCount})
                    <div onclick={handleOpenFilter} class="cursor-pointer">
                        <lightning-icon icon-name="utility:filterList" size="xx-small"></lightning-icon>
                    </div>
                </h6>
                <div class="slds-grid"></div>
            </div>
        </div>

        <div class="scroll-bar-wrap">
            <div class="scroll-box">
                <template if:true={toastMeassage}>
                    <h4 class="slds-text-heading_small slds-m-around_small">
                        {message}<br />
                        Click on the filter icon above to change filter criteria.
                    </h4>
                </template>

                <template for:each={maps} for:item="cus" for:index="key">
                    <article key={cus.queueId} class="slds-card slds-m-bottom_small car1">
                        <a data-name={cus.value.Booked_Date__c} data-value={cus.value.Id} data-rec-id={recIdValue}
                            onclick={GetRegsDetails}
                            class="slds-card__body slds-p-around_medium slds-grid slds-wrap car3">

                            <div class="slds-col slds-size_1-of-1 slds-grid slds-grid_align-spread slds-m-bottom_small">

                                    <lightning-icon icon-name="utility:user" size="small" class="slds-m-right_x-small"></lightning-icon>
                                    <span>
                                        <template if:true={cus.value.Contact__c}>
                                            <template if:true={cus.value.Contact__r.Name}>
                                                <strong>{cus.value.Customer_Name__c} {cus.value.Customer_Lastname__c}</strong><!--{cus.value.Contact__r.Name}-->
                                            </template>
                                            <template if:false={cus.value.Contact__r.Name}>
                                                <strong>{cus.value.Customer_Name__c} {cus.value.Customer_Lastname__c}</strong>
                                            </template>
                                        </template>
                                        <template if:false={cus.value.Contact__c}>
                                            <strong>{cus.value.Customer_Name__c} {cus.value.Customer_Lastname__c}</strong>
                                        </template>
                                    </span>
                                </div>
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="utility:display_text" size="small" class="slds-m-right_x-small"></lightning-icon>
                                    <span>{cus.value.Name}</span>
                                </div>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-grid slds-grid_align-spread">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="utility:clock" size="small" class="slds-m-right_x-small"></lightning-icon>
                                    <lightning-formatted-date-time value={cus.value.Registration_Time__c} hour="2-digit" minute="2-digit" time-zone={timezone}></lightning-formatted-date-time>
                                </div>
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="utility:hourglass" size="x-small" alternative-text="Hourglass"></lightning-icon>

                                    <template if:true={itemStatusNotBooked}>
                                        <div class="waiting-time-box">
                                            <template if:true={waitingtimenull}>--</template>
                                            <template if:false={waitingtimenull}>
                                                <c-counter-schlwc key={cus.value.Id} reg-id={cus.value.Id}
                                                    wt-exceed={cus.value.Wait_Time_Exceeded__c}
                                                    waiting-thershold={cus.value.Product2__r.Wait_Threshold__c}
                                                    count={cus.value.Checked_in_Date_Time__c}>
                                                </c-counter-schlwc>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </a>

                       <footer class="slds-card__footer slds-grid slds-grid_align-spread slds-p-around_small">
                        <template if:true={isFutureAppointments}>
                            <div class="cancel-button-container slds-grid_align-end">
                                <button
                                    type="button"
                                    class="slds-button slds-button_neutral reschedule-on-hover"
                                    data-value="Reschedule"
                                    data-name={cus.value.Id}
                                    data-title={cus.value.Status__c}
                                    onclick={handleWorkbenchOperation}>
                                    Reschedule
                                </button>

                                <button
                                    type="button"
                                    class={cancelButtonClass}
                                    name={cus.value.Id}
                                    onclick={handleGetStatusNoShow}>
                                    Cancel
                                </button>

                                <!--<lightning-button-icon-stateful icon-name="utility:like" selected={likeState} onclick={handleLikeButtonClick} alternative-text="Like"></lightning-button-icon-stateful>lightning-button label="Reschedule" icon-name="utility:loop"
                                    onclick={handleWorkbenchOperation} data-value="Reschedule" data-name={cus.value.Id}
                                    data-title={cus.value.Status__c} class="slds-button_neutral reschedule-on-hover "></lightning-button>

                                <lightning-button label="Cancel" name={cus.value.Id} class={cancelButtonClass}
                                    onclick={handleGetStatusNoShow}></lightning-button-->
                            </div>
                        </template>

                        <template if:false={isFutureAppointments}>
                            <button
                                type="button"
                                class={buttonClass}
                                value={cus.value.Id}
                                data-id={cus.value.Id}
                                name={cus.value.Checked_in_Date_Time__c}
                                disabled={isButtonDisabled}
                                onclick={handleChangeLabelGetRecord}>
                                {cus.buttonLabel}
                                <!--{buttonLabel}-->
                            </button>

                            <button
                                type="button"
                                class={cancelButtonClass}
                                name={cus.value.Id}
                                onclick={handleGetStatusNoShow}>
                                Cancel
                            </button>

                            <!--lightning-button label={buttonLabel} value={cus.value.Id} class={buttonClass} name={cus.value.Checked_in_Date_Time__c}
                                disabled={isButtonDisabled} onclick={handleChangeLabelGetRecord}></lightning-button>

                            <lightning-button label="Cancel" name={cus.value.Id} class={cancelButtonClass}
                                onclick={handleGetStatusNoShow}></lightning-button-->
                        </template>
                    </footer>
                    </article>
                </template>
            </div>
        </div>
                                         </div>
                                </div>



                            <div class="slds-col slds-size_1-of-3">
                               <div class="slds-form maq-form shadow-sm" role="list">
                                    <template if:true={flag}>
                                        <div class="slds-grid slds-gutters_small">
                                            <div class="slds-col slds-has-flexi-truncate" role="listitem">
                                                <div class="slds-form-element slds-form-element_edit slds-hint-parent">
                                                    <legend class="slds-form-element__label slds-text-title_caps slds-text-heading_small slds-p-bottom_x-small slds-grid slds-grid_vertical-align-center">
                                                        <lightning-icon icon-name="utility:flag" size="x-small" class="slds-m-right_x-small car4"></lightning-icon>
                                                        <span class="slds-m-left_xx-small">Flagged</span>
                                                    </legend>
                                                    <hr class="slds-m-vertical_x-small" />
                                                </div>
                                            </div>
                                        </div>
                                    </template>

                                    <div class="slds-p-around_small slds-card slds-m-bottom_medium car1">

                                            <lightning-icon icon-name="standard:record" size="x-small" class="slds-m-right_x-small car5"></lightning-icon>
                                            <span class="slds-m-left_xx-small">Information</span>
                                        </legend>
                                        <hr class="slds-m-vertical_x-small" />

                                            <lightning-layout multiple-rows class="slds-p-around_small">
                                                <lightning-layout-item size="6" small-device-size="12" padding="horizontal-small">
                                                    <c-search-comp-sch
                                                        obj-name="Registration_SCH__c"
                                                        data-id="expertLookup1"
                                                        key={firstRecordId}
                                                        label-name="Registration Number"
                                                        placeholder=""
                                                        fields='Name'
                                                        display-fields='Name'
                                                        value-id={firstRecordId}
                                                        selected-record-id={firstRecordId}>
                                                    </c-search-comp-sch>
                                                </lightning-layout-item>

                                                <lightning-layout-item size="6" small-device-size="12" padding="horizontal-small">
                                                    <c-search-comp-sch
                                                        obj-name="Contact"
                                                        data-id="expertLookup2"
                                                        label-name="Contact"
                                                        placeholder=""
                                                        fields='Name'
                                                        display-fields='Name'
                                                        value-id={firstRecordContact}

                                                    </c-search-comp-sch>
                                                </lightning-layout-item>

                                                <lightning-layout-item size="6" small-device-size="12" padding="horizontal-small">
                                                    <c-search-comp-sch

                                                        data-id="expertLookup3"
                                                        label-name="Location"
                                                        placeholder=""
                                                        fields='Name'
                                                        display-fields='Name'

                                                    </c-search-comp-sch>
                                                </lightning-layout-item>

                                                <lightning-layout-item size="6" small-device-size="12" padding="horizontal-small">
                                                    <c-search-comp-sch
                                                        obj-name="User"
                                                        data-id="expertLookup4"
                                                        label-name="User"
                                                        placeholder=""
                                                        fields='Name'
                                                        display-fields='Name'
                                                        value-id={firstRecordResourceUser}
                                                        selected-record-id={firstRecordResourceUser}>
                                                    </c-search-comp-sch>
                                                </lightning-layout-item>
                                            </lightning-layout>
                                        </template>
                                    </div>

                                    <div class="slds-p-around_small slds-card slds-m-bottom_medium car1">
                                        <template if:true={appFields.length}>
                                            <legend class="slds-form-element__label slds-text-title_caps slds-text-heading_small slds-p-bottom_x-small slds-grid slds-grid_vertical-align-center">
                                                <lightning-icon icon-name="standard:event" size="x-small" class="slds-m-right_x-small car5"></lightning-icon>
                                                <span class="slds-m-left_xx-small">Appointment Detail</span>
                                            </legend>
                                            <hr class="slds-m-vertical_x-small" />
                                            <lightning-record-edit-form object-api-name="Registration_SCH__c" record-id={selectedRecordId} class="slds-p-around_small">
                                                <lightning-messages></lightning-messages>
                                                <lightning-layout multiple-rows>
                                                    <template for:each={appFields} for:item="item">
                                                        <lightning-layout-item key={item} size="12" padding="horizontal-small">
                                                            <lightning-input-field field-name={item}></lightning-input-field>
                                                        </lightning-layout-item>
                                                    </template>
                                                </lightning-layout>
                                            </lightning-record-edit-form>
                                        </template>
                                    </div>

                                    <div class="slds-p-around_small slds-card slds-m-bottom_medium car1">
                                        <template if:true={customerFields.length}>
                                            <legend class="slds-form-element__label slds-text-title_caps slds-text-heading_small slds-p-bottom_x-small slds-grid slds-grid_vertical-align-center">
                                                <lightning-icon icon-name="standard:contact_list" size="x-small" class="slds-m-right_x-small car5"></lightning-icon>
                                                <span class="slds-m-left_xx-small">Customer Details</span>
                                            </legend>
                                            <hr class="slds-m-vertical_x-small" />
                                            <lightning-record-edit-form object-api-name="Registration_SCH__c" record-id={selectedRecordId} class="slds-p-around_small">
                                                <lightning-messages></lightning-messages>
                                                <lightning-layout multiple-rows>
                                                    <template for:each={customerFields} for:item="item">
                                                        <lightning-layout-item key={item} size="6" small-device-size="12" padding="horizontal-small">
                                                            <lightning-input-field field-name={item}></lightning-input-field>
                                                        </lightning-layout-item>
                                                    </template>
                                                </lightning-layout>
                                            </lightning-record-edit-form>
                                        </template>
                                    </div>

                                    <div class="slds-p-around_small slds-card slds-m-bottom_medium car1">

                                                <lightning-icon icon-name="standard:link" size="x-small" class="slds-m-right_x-small car5"></lightning-icon>
                                                <span class="slds-m-left_xx-small">Meeting Details</span>
                                            </legend>
                                            <hr class="slds-m-vertical_x-small" />
                                            <lightning-record-edit-form object-api-name="Registration_SCH__c" record-id={selectedRecordId} class="slds-p-around_small">
                                                <lightning-messages></lightning-messages>
                                                <lightning-layout multiple-rows>
                                                    <template for:each={meetingFields} for:item="item">
                                                        <lightning-layout-item key={item} size="12" padding="horizontal-small">
                                                            <lightning-input-field field-name={item}></lightning-input-field>
                                                        </lightning-layout-item>
                                                    </template>
                                                </lightning-layout>
                                            </lightning-record-edit-form>
                                        </template>
                                    </div>

                                    <div class="slds-docked-form-footer">
                                        <template if:true={isCompletedOrPastAppointments}>
                                            <lightning-button
                                                label="Save"
                                                disabled
                                                variant="brand"
                                            ></lightning-button>
                                        </template>
                                        <template if:false={isCompletedOrPastAppointments}>
                                            <lightning-button
                                                label="Save"
                                                disabled={isRecordValuesEmpty}
                                                 variant="brand"
                                                onclick={handleSaveRecord}
                                            ></lightning-button>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-col slds-size_1-of-3 hideintab">
                               <div class="slds-card slds-m-around_small slds-p-around_small car1">
                                <legend class="slds-form-element__label slds-text-title_caps slds-text-heading_small slds-p-bottom_x-small slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="standard:note" size="x-small" class="slds-m-right_x-small car5"></lightning-icon>

                                </legend>
                                <hr class="slds-m-vertical_x-small" />

                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="slds-col slds-size_3-of-12 slds-grid slds-grid_align-end">

                                        <lightning-button-icon
                                            class="slds-m-left_x-small"
                                            icon-name="utility:new"

                                            title="New Note"
                                            onclick={handleNewNote}
                                            disabled={isRecordValuesEmpty}
                                            variant="border-filled"
                                            ></lightning-button-icon>

                                            <lightning-button-icon
                                                icon-name="utility:new"

                                                title="New Note"
                                                onclick={handleNewNote}
                                                disabled={isRecordValuesEmpty}
                                                class="slds-button_icon-border-filled"
                                            ></lightning-button-icon>
                                        </lightning-button-group-->

                                </div>

                                                    {note.Title}

                                                    icon-name="utility:delete"
                                                    alternative-text="Delete Note"
                                                    title="Delete Note"
                                                    onclick={handleOpenConfirm}
                                                    data-name={note.Id}
                                                    data-value="Note"
                                                    size="x-small"

                                                ></lightning-button-icon>
                                                </div>

                                                <lightning-button-icon
                                                    icon-name="utility:delete"
                                                    alternative-text="Delete Note"
                                                    title="Delete Note"
                                                    onclick={handleOpenConfirm}
                                                    data-name={note.Id}
                                                    data-value="Note"
                                                    size="x-small"
                                                    class="slds-button_icon-border-filled"
                                                ></lightning-button-icon>
                                            </div-->

                                            </div>

                                                <a href={attachment.attachmentUrl} target="_blank" class="slds-media__body slds-truncate">
                                                    {attachment.Name}
                                                </a>
                                                <lightning-button-icon
                                                    icon-name="utility:delete"
                                                    alternative-text="Delete Attachment"
                                                    title="Delete Attachment"
                                                    onclick={handleOpenConfirm}

        <template if:true={showNoteModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-02" aria-modal="true" data-id="showNoteModal"
                class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <div class="slds-modal__header">
                    <h2 class="slds-text-heading_medium car6">Notes</h2>
                </div>
                <div class="slds-modal__content slds-p-around_small">
                    <div class="modal-body">
                        <lightning-input
                            label="Title"
                            required
                            class="slds-m-bottom_small"
                            value={newNote.Title}
                                onchange={handleTitleChange}
                        ></lightning-input>

                        <lightning-input
                            type="checkbox"
                            label="Private"
                            class="slds-m-bottom_small"
                            checked={newNote.isPrivate}
                                onchange={handlePrivateChange}
                        ></lightning-input>

                        <lightning-textarea
                            label="Body"
                            value={newNote.Body}
                                onchange={handleBodyChange}
                            ></lightning-textarea>
                    </div>
                </div>
                <div class="slds-modal__footer car7">
                    <lightning-button
                        label="Save"
                        variant="brand"
                        onclick={handleSaveNote}
                        class="slds-m-right_small"
                    ></lightning-button>
                    <lightning-button
                        label="Cancel"
                        variant="neutral"
                        onclick={handleCloseNoteModal}
                    ></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
