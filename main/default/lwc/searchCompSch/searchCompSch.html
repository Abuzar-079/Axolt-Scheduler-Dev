<template>

    <lightning-spinner if:true={isLoading} alternative-text="Loading" size="small"></lightning-spinner>
    <div class="slds-form-element">
        <template if:false={hideLabel}>
            <label  class="slds-form-element__label" for="combobox-id-1">
                 <abbr if:true={required} class="slds-required" title="required">*</abbr>
                <strong>{labelName}</strong>
                </label>
        </template> 
        <div>
            <div class="slds-combobox_container">
  <div class="slds-combobox slds-dropdown-trigger slds-dropdown-trigger_click" aria-expanded="false" aria-haspopup="listbox" role="combobox">

    <!-- When no record is selected -->
    <template if:false={selectedRecord}>
      <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_left-right" role="none">
<span class="slds-icon_container slds-icon-standard-account slds-combobox__input-entity-icon" title={objectLabel}>
          <svg class="slds-icon slds-icon_small" aria-hidden="true">
            <use xlink:href={ICON_URL}></use>
          </svg>
          <span class="slds-assistive-text bold">{objectLabel}</span>
        </span>
        <!-- FIXED LEFT ICON -->
        <!--span class="slds-icon_container slds-icon-standard-account slds-input__icon slds-input__icon_left " title="Account">
            <svg class="slds-icon slds-icon_xx-small slds-m-left_small" aria-hidden="true">
              <use xlink:href={ICON_URL}></use>
            </svg>
        </span-->

        <input type="text" onchange={handleInputChange} onkeyup={handleInputChange} onkeydown={handleInputChange} onfocus={handleInputChange}
          class="slds-input slds-combobox__input" 
          id="combobox-id-1" aria-autocomplete="list" aria-controls="listbox-id-1" autocomplete="off" 
          role="textbox" placeholder={placeholder}/>
            
        <!--<span class="slds-media__figure slds-listbox__option-icon">
          <span class="slds-icon_container slds-icon-standard-account">
            <svg class="slds-icon slds-icon_small" aria-hidden="true">
              <use xlink:href={ICON_URL}></use>
            </svg>
          </span>
        </span>-->

        <span class="slds-icon_container slds-icon-utility-search slds-input__icon slds-input__icon_right">
          <svg class="slds-icon slds-icon slds-icon_x-small slds-icon-text-default" aria-hidden="true">
            <use xlink:href="/apexpages/slds/latest/assets/icons/utility-sprite/svg/symbols.svg#search"></use>
          </svg>
        </span>
      </div>

      <!-- Result dropdown -->
      <!--<div id="listbox-id-1" class="slds-dropdown slds-dropdown_length-with-icon-7 slds-dropdown_fluid" role="listbox">
        <ul class="slds-listbox slds-listbox_vertical" role="presentation">
          {message}
          <template if:true={searchRecords}>
            <template for:each={searchRecords} for:item="record">
              <li key={record.Id} onclick={handleSelect} data-record-id={record.Id} role="presentation" data-name={record.Name}>
                <span class="slds-lookup__item-action slds-lookup__item-action--label" role="option">
                  <lightning-icon class="slds-icon slds-icon--small slds-icon-text-default" icon-name={iconName} alternative-text={objName} size="small"></lightning-icon>
                  <span class="slds-truncate">{record.Name}</span>
                </span>
              </li>
            </template>
          </template>                                
        </ul>
      </div>-->

      <div style="display:block;" id="listbox-id-1" class="slds-dropdown slds-dropdown_length-with-icon-7 slds-dropdown_fluid" role="listbox">
        <ul class="slds-listbox slds-listbox_vertical" role="presentation">
          <template if:true={searchRecords} for:each={searchRecords} for:item="record" for:index="index">
            <li onclick={handleSelect} role="presentation" class="slds-listbox__item" data-record-id={record.Id} key={record.Id}>
              <div data-id={record.Id} class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_has-meta" role="option">
                <span class="slds-media__figure slds-listbox__option-icon">
                  <span class="slds-icon_container slds-icon-standard-account">
                    <svg class="slds-icon slds-icon_small" aria-hidden="true">
                      <use xlink:href={ICON_URL}></use>
                    </svg>
                  </span>
                </span>
                <span class="slds-media__body">
                  <span class="slds-listbox__option-text slds-listbox__option-text_entity">{record.Name}</span>
                </span>
              </div>
            </li>
          </template>
          <template if:true={searchRecordsempty}>
            No Records to display
          </template>
        </ul>
      </div>
    </template>

    <!-- When record is selected -->
    <template if:true={selectedRecord}>
      <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_left-right" role="none">
        <span class="slds-icon_container slds-icon-standard-account slds-combobox__input-entity-icon" title={objectLabel}>
          <svg class="slds-icon slds-icon_small" aria-hidden="true">
            <use xlink:href={ICON_URL}></use>
          </svg>
          <span class="slds-assistive-text bold">{objectLabel}</span>
        </span>
        <input type="text" class="slds-input slds-combobox__input slds-combobox__input-value" 
          id="combobox-id-5" aria-controls="listbox-id-5"  
          autocomplete="off" role="textbox" placeholder="Select an Option…" 
          readonly value={selectedRecord.Name}
        />
        <!--<button class="slds-button slds-button_icon slds-input__icon slds-input__icon_right" 
          title="Remove selected option" onclick={handleClose}>
          <svg class="slds-button__icon" aria-hidden="true">
            <use xlink:href="/apexpages/slds/latest/assets/icons/utility-sprite/svg/symbols.svg#close"></use>
          </svg>
          <span class="slds-assistive-text">Remove selected option</span>
        </button>-->
        <button class="slds-button slds-button_icon slds-input__icon slds-input__icon_right"
          title="Remove selected option" onclick={handleClose}>
          <svg class="slds-button__icon" aria-hidden="true">
            <use xlink:href="/apexpages/slds/latest/assets/icons/utility-sprite/svg/symbols.svg#close"></use>
          </svg>
          <span class="slds-assistive-text">Remove selected option</span>
        </button>
      </div>
    </template>

  </div>
</div>

        </div>
    </div>
</template>
