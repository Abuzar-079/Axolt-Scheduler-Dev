<template>
    <lightning-card title="Queue Management System" icon-name="standard:queue">
       <div slot="actions">
        <lightning-button-icon
            icon-name="utility:filterList"
            alternative-text="Filter"
            title="Filter"
            onclick={toggleFilters}
            class="slds-m-left_x-small">
        </lightning-button-icon>
    </div>
    <!--<template if:true={errorMessage}>

            <div class="slds-notify slds-notify_alert slds-theme_error" role="alert">
                <span class="slds-assistive-text">error</span>
                <span>{errorMessage}</span>
            </div>

        </template>-->
        <template if:true={errorMessage}>
    <div class="slds-notify_container slds-is-fixed">
        <div class="slds-notify slds-notify_toast slds-theme_warning" role="status">
            <span class="slds-assistive-text">Error</span>

            <!-- adnan updated to slds2 <span class="slds-icon_container slds-icon-utility-warning slds-m-right_small slds-no-flex slds-align-top" title="Error"> -->
                <span class="slds-icon_container slds-icon-text-warning slds-m-right_small slds-no-flex slds-align-top" title="Error">
                <lightning-icon icon-name="utility:warning" size="small" variant="inverse"></lightning-icon>
            </span>

            <div class="slds-notify__content">
                <h2 class="slds-text-heading_small">{errorMessage}</h2>
            </div>

            <div class="slds-notify__close">
                <lightning-button-icon
                    icon-name="utility:close"
                    variant="bare-inverse"
                    alternative-text="Close notification"
                    title="Close"
                    onclick={closeError}>
                </lightning-button-icon>
            </div>
        </div>
    </div>
</template>

        <!-- Toast Message -->
       <!-- <template if:true={toastMessage}>

            <div class="slds-notify slds-notify_toast slds-theme_success" role="status">
                <span class="slds-assistive-text">success</span>
                <span>{toastMessage}</span>
            </div>

        </template>-->
    <template if:true={toastMessage}>
    <div class="slds-notify_container slds-is-fixed">
        <div class="slds-notify slds-notify_toast slds-theme_success" role="status">
            <span class="slds-assistive-text">Success</span>

            <span class="slds-icon_container slds-icon-utility-success slds-m-right_small slds-no-flex slds-align-top" title="Success">
                <lightning-icon icon-name="utility:success" size="small" variant="inverse"></lightning-icon>
            </span>

            <div class="slds-notify__content">
                <h2 class="slds-text-heading_small">{toastMessage}</h2>
            </div>

            <div class="slds-notify__close">
                <lightning-button-icon
                    icon-name="utility:close"
                    variant="bare-inverse"
                    alternative-text="Close notification"
                    title="Close"
                    onclick={closeToast}>
                </lightning-button-icon>
            </div>
        </div>
    </div>
</template>

    <template if:true={showFilters}>
        <div class="axolt-container slds-box slds-theme_shade slds-m-around_medium car1">
            <!-- Filter Fields -->
            <div class="slds-grid slds-gutters slds-wrap">
                <div class="slds-col slds-size_3-of-12">
                    <c-search-comp-sch
                        obj-name="Expert_Location__c"
                        label-name="Location"
                        placeholder="Search"
                        fields="Name"
                        display-fields="Name"
                        value-id={locId}
                        onlookup={handleLocationChange}>
                    </c-search-comp-sch>
                </div>

                <!--<div class="slds-col slds-size_3-of-12">
                    <c-search-comp-sch
                        obj-name="Membership_Program__c"
                        label-name="Program"
                        placeholder="Search"
                        fields="Name"
                        display-fields="Name"
                        value-id={setProgram}
                        onlookup={handleProgramChange}>
                    </c-search-comp-sch>
                </div>-->

                <div class="slds-col slds-size_3-of-12">
                    <c-search-comp-sch
                        obj-name="Product2"
                        label-name="Service"
                        placeholder="Search"
                        fields="Name"
                        display-fields="Name"
                         filter={serviceFilter}
                        value-id={setServiceID}
                        onlookup={handleServiceChange}>
                    </c-search-comp-sch>
                </div>

                <div class="slds-col slds-size_3-of-12">
                    <c-search-comp-sch
                        obj-name="User"
                        label-name="User"
                        placeholder="Search"
                        fields="Name"
                        display-fields="Name"
                        value-id={setExpert}
                        value-name={setExpertName}
                        onlookup={handleExpertChange}
                        onremove={handleExpertRemove}>
                    </c-search-comp-sch>
                </div>


            </div>


        </div>
    </template>

    <!-- Filters Section (collapsible panel) -->

        <!-- Spinner -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </template>

        <!-- Error Message -->


      <div class="axolt-container">
        <!-- Service Registration Column -->
        <div class="slds-col slds-size_1-of-3 axolt-column car2">
            <h2 class="axolt-header">
                <lightning-icon
        icon-name="action:new_case"
        size="x-small"
        class="slds-m-right_x-small car4"
        >
    </lightning-icon>&nbsp;Service Registration</h2>
            <!-- Inner grid for two-column input layout -->
            <div class="slds-grid slds-wrap slds-gutters">
    <!-- Service - Full Width Row -->
    <div class="slds-col slds-size_1-of-2">
        <div class="axolt-input-group">
            <c-search-comp-sch data-id="expertLookup2" obj-name="Product2"
                label-name="Service"
                placeholder="Search" fields='Name' display-fields='Name' filter={serviceFilter}  required={isLookupRequired}
                value-id={setServiceID} onlookup={handleServiceChange2}  class="custom-lookup">
            </c-search-comp-sch>
           <!-- <div class="fieldLabel">Service</div>
             <c-input-lookup obj-name="Product2" selected-record-id={setServiceID} onlookupselected={handleServiceChange2} qry={serviceFilter}></c-input-lookup>-->
        </div>
    </div>
     <div class="slds-col slds-size_1-of-2">
        <div class="axolt-input-group">
            <c-search-comp-sch data-id="expertLookup6" obj-name="User"
                label-name="User"
                placeholder="Search" fields='Name' display-fields='Name' required={isLookupRequired}
                value-id={setExpert} onlookup={handleExpertChange2}  class="custom-lookup">
            </c-search-comp-sch>
            <!-- <div class="fieldLabel">User</div>
            <c-input-lookup obj-name="User" selected-record-id={setExpert} onlookupselected={handleExpertChange2}></c-input-lookup>-->
        </div>
    </div>

    <!-- First Name & Last Name -->
    <div class="slds-col slds-size_1-of-2">
        <div class="axolt-input-group custom-input-wrapper">
            <lightning-input
                label="First Name"
                type="text"
                required
                value={queueRecord.firstName}
                onchange={handleInputChange}
                name="firstName"

            ></lightning-input>
        </div>
    </div>
    <div class="slds-col slds-size_1-of-2">
        <div class="axolt-input-group">
            <lightning-input
                label="Last Name"
                type="text"
                required
                value={queueRecord.lastName}
                onchange={handleInputChange}
                name="lastName"
            ></lightning-input>
        </div>
    </div>

    <!-- Email -->
    <div class="slds-col slds-size_1-of-1">
        <div class="axolt-input-group">
            <lightning-input
                label="Email"
                type="email"
                required
                value={queueRecord.email}
                onchange={handleInputChange}
                name="email"
            ></lightning-input>
        </div>
    </div>

    <!-- Phone -->
    <div class="slds-col slds-size_1-of-1">
        <div class="axolt-input-group">
            <lightning-input
                label="Phone"
                type="tel"
                required
                value={queueRecord.phone}
                onchange={handleInputChange}
                name="phone"
            ></lightning-input>
        </div>
    </div>

    <!-- Start Time -->
    <div class="slds-col slds-size_1-of-1">
        <div class="axolt-input-group">
            <lightning-input
                label="Start Time"
                type="datetime"
                value={queueRecord.startTime}
                onchange={handleInputChange}
                name="startTime"
            ></lightning-input>
        </div>
    </div>



</div>


            <!-- Service Error -->
            <template if:true={showSerErr}>
                <div class="slds-text-color_error slds-m-top_small">* Select Service</div>
            </template>

            <!-- Action Buttons -->
            <div class="slds-m-top_large slds-align_absolute-center">
                <lightning-button
                    variant="brand"
                    label={checkInLabel}
                    onclick={handleCheckIn}
                    disabled={isDisabled}
                    class=""
                ></lightning-button>
                <lightning-button
                    variant="neutral"
                    label="Clear"
                    onclick={handleClear}
                    class="slds-m-left_small "
                ></lightning-button>
            </div>
        </div>

        <!-- Waiting List Column -->
        <div class="slds-col slds-size_1-of-3 axolt-column car2" >
            <h2 class="axolt-header"><lightning-icon
        icon-name="action:approval"
        size="x-small"
        class="slds-m-right_x-small car4"
        >
    </lightning-icon>&nbsp;Waiting List</h2>
            <template if:true={noLocationSelected}>
                <h2 class="slds-text-heading_small slds-m-around_small">Please Select The Location</h2>
            </template>

           <!-- <template if:true={toastMessage}>
                <div class="slds-notify slds-notify_alert slds-theme_info" role="alert">
                    <span class="slds-assistive-text">info</span>
                    <span>{toastMessage}</span>
                </div>
            </template>-->

            <div class="slds-scrollable_y queue-records-container axolt-scrollable-list">
                <div class="slds-m-top_small"></div>
                <template for:each={maps} for:item="record" for:index="index">
                    <div
    key={record.Id}
    class={record.cssClass}
    data-id={record.Id}
    data-index={index}
    onclick={handleRecordSelect}
>
    <div class="slds-p-around_small">
        <div class="slds-grid slds-grid_align-spread slds-wrap">
            <div class="slds-col slds-size_1-of-2 slds-medium-size_5-of-12">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <lightning-icon
                        icon-name="utility:file"
                        size="xx-small"
                        class="slds-m-right_x-small"
                        title="Reference Number"
                    ></lightning-icon>
                    <span class="clickable-text axolt-link">
                        {record.Name} ({record.Token_Number__c})
                    </span>
                </div>
            </div>
            <div class="slds-col slds-size_1-of-2 slds-medium-size_6-of-12">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <lightning-icon
                        icon-name="utility:user"
                        size="xx-small"
                        class="slds-m-right_x-small"
                        title="Name"
                    ></lightning-icon>
                    <span class="slds-truncate">
                        {record.Customer_Name__c} {record.Customer_Lastname__c}
                    </span>
                </div>
            </div>
        </div>
        <div class="slds-grid slds-grid_align-spread slds-m-top_small slds-wrap">
            <div class="slds-col slds-size_1-of-2 slds-medium-size_5-of-12">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <lightning-icon
                        icon-name="utility:call"
                        size="xx-small"
                        class="slds-m-right_x-small"
                        title="Phone"
                    ></lightning-icon>
                    <span>{record.Customer_Contact__c}</span>
                </div>
            </div>
            <div class="slds-col slds-size_1-of-2 slds-medium-size_6-of-12">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <lightning-icon
                        icon-name="utility:email"
                        size="xx-small"
                        class="slds-m-right_x-small"
                        title="Email"
                    ></lightning-icon>
                    <span class="slds-truncate">
                        {record.Customer_Email__c}
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>

                </template>
            </div>
        </div>

        <!-- Booked Registration Column -->
        <div class="slds-col slds-size_1-of-3 axolt-column car2" >
            <h2 class="axolt-header"> <lightning-icon
        icon-name="action:new_event"
        size="x-small"
        class="slds-m-right_x-small car4"
        >
    </lightning-icon>&nbsp;Booked Registration</h2>
            <div>
                <!-- Search and Find -->
                <!-- Search and Find with Filter Icon -->
<div class="slds-grid slds-gutters slds-wrap slds-align-end slds-p-bottom_small">
    <!-- Search Input -->
    <div class="slds-col slds-size_1-of-1 slds-large-size_6-of-12">
       <div class="slds-form-element slds-input-has-icon slds-input-has-icon_right">
    <lightning-input
        type="text"
        placeholder="Search by Name/Number/Email"
        value={searchFilterBy}
        onchange={handleSearchChange}
        variant="label-hidden"
        class="axolt-search-input"
    ></lightning-input>

    <!-- Use lightning-icon outside of lightning-input -->
    <span class="slds-icon_container slds-input__icon slds-input__icon_right" title="Search" onclick={handleFind}>
        <lightning-icon
            icon-name="utility:search"
            size="x-small"
            class="slds-icon slds-icon-text-default"
        ></lightning-icon>
    </span>
</div>

    </div>

    <!-- Find Button -->
    <div class="slds-col slds-size_5-of-12 slds-large-size_3-of-12">
        <lightning-button
            variant="brand"
            label="Find"
            title="Find"
            onclick={handleFind}
            class=""
        ></lightning-button>
    </div>

    <!-- Filter Icon with Popover -->
    <div class="slds-col slds-size_1-of-12 slds-large-size_1-of-12 slds-relative">
        <lightning-button-icon
            icon-name="utility:filterList"
            variant="border-filled"
            alternative-text="Filter"
            class="slds-button_icon"
            onclick={toggleFilterPopover}
        ></lightning-button-icon>

        <!-- Popover Dropdown for Filter -->
        <template if:true={showFilter}>
            <div class="slds-popover  slds-is-absolute car3">
                <div class="slds-popover__body">
                    <lightning-combobox
                        label="Filter by"
                        value={dateFilterBy}
                        options={dateFilterOptions}
                        onchange={handleDateFilterChange}
                        class="axolt-combobox"
                    ></lightning-combobox>
                </div>
            </div>
        </template>
    </div>
</div>


                <!-- Existing Registrations -->
                <template if:true={hasRegistrations}>
                    <div class="slds-scrollable_y registrations-container axolt-scrollable-list ">
                        <template for:each={ExistReg} for:item="record" for:index="index">
                            <div
                                key={record.Id}
                                class={record.cssClass}
                                onclick={handleEditRecordSelect}
                                data-index={index}
                            >
                                <div class="slds-p-around_small slds-m-top_small">
                                    <!-- Customer Name -->
                                    <div class="slds-grid slds-grid_align-spread slds-wrap">
                                        <div class="slds-col slds-size_7-of-12">
                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                <lightning-icon
                                                    icon-name="utility:user"
                                                    size="xx-small"
                                                    class="slds-m-right_x-small"
                                                    title="Name"
                                                ></lightning-icon>
                                                <strong class="slds-truncate">{record.Customer_Name__c}</strong>
                                            </div>
                                        </div>
                                        <div class="slds-col slds-size_5-of-12">
                                            <lightning-button-menu
                                                alternative-text="Actions"
                                                menu-alignment="right"
                                                onselect={handleStatusUpdate}
                                                data-id={record.Id}
                                                class="slds-float_right axolt-menu-button"
                                            >
                                                <lightning-menu-item
                                                    value="Completed"
                                                    label="Completed"
                                                ></lightning-menu-item>
                                                <lightning-menu-item
                                                    value="Cancelled"
                                                    label="Cancel"
                                                ></lightning-menu-item>
                                                <lightning-menu-item
                                                    value="No Show"
                                                    label="No Show"
                                                ></lightning-menu-item>
                                            </lightning-button-menu>
                                        </div>
                                    </div>

                                    <!-- Reference Number and Email -->
                                    <div class="slds-grid slds-grid_align-spread slds-m-top_small slds-wrap">
                                        <div class="slds-col slds-size_4-of-12">
                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                <lightning-icon
                                                    icon-name="utility:file"
                                                    size="xx-small"
                                                    class="slds-m-right_x-small"
                                                    title="Reference Number"
                                                ></lightning-icon>
                                                <span>{record.Name}</span>
                                            </div>
                                        </div>
                                        <div class="slds-col slds-size_8-of-12">
                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                <lightning-icon
                                                    icon-name="utility:email"
                                                    size="xx-small"
                                                    class="slds-m-right_x-small"
                                                    title="Email"
                                                ></lightning-icon>
                                                <span class="slds-truncate">{record.Customer_Email__c}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Registration Time -->
                                    <div class="slds-grid slds-m-top_small">
                                        <div class="slds-col slds-size_1-of-1">
                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                <lightning-icon
                                                    icon-name="utility:clock"
                                                    size="xx-small"
                                                    class="slds-m-right_x-small"
                                                    title="Arrival Time"
                                                ></lightning-icon>
                                                <lightning-formatted-date-time
                                                    value={record.Registration_Time__c}
                                                    year="numeric"
                                                    month="long"
                                                    day="2-digit"
                                                    weekday="long"
                                                    hour="2-digit"
                                                    minute="2-digit"
                                                    time-zone-name="short"
                                                    time-zone={userTimeZone}
                                                ></lightning-formatted-date-time>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Phone and Member -->
                                    <div class="slds-grid slds-grid_align-spread slds-m-top_small slds-wrap">
                                        <div class="slds-col slds-size_6-of-12">
                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                <lightning-icon
                                                    icon-name="utility:call"
                                                    size="xx-small"
                                                    class="slds-m-right_x-small"
                                                    title="Phone"
                                                ></lightning-icon>
                                                <span>{record.Customer_Contact__c}</span>
                                            </div>
                                        </div>
                                        <template if:true={record.Member__c}>
                                            <div class="slds-col slds-size_6-of-12">
                                                <div class="slds-grid slds-grid_vertical-align-center">
                                                    <lightning-icon
                                                        icon-name="utility:id"
                                                        size="small"
                                                        class="slds-m-right_x-small"
                                                        title="MemberId"
                                                    ></lightning-icon>
                                                    <span>{record.Member__r.Name}</span>
                                                </div>
                                            </div>
                                        </template>
                                    </div>

                                    
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </div>
    </div>



        <!-- Cancellation Modal -->
        <template if:true={showCancelModal}>
            <section
                role="dialog"
                tabindex="-1"
                aria-labelledby="modal-heading-01"
                aria-modal="true"
                class="slds-modal slds-fade-in-open"
            >
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 id="modal-heading-01" class="slds-modal__title">Cancel Registration</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-combobox
                            label="Cancellation Reason"
                            value={cancellationReason}
                            options={cancellationReasons}
                            onchange={handleCancellationReasonChange}
                        ></lightning-combobox>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button
                            variant="neutral"
                            label="Close"
                            onclick={handleCloseModal}
                        ></lightning-button>
                        <lightning-button
                            variant="brand"
                            label="Confirm"
                            onclick={handleConfirmCancel}
                        ></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
